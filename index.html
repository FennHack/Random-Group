<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembagi Grup X E8</title>

<style>
body{
    font-family:sans-serif;
    background:linear-gradient(135deg,#1e3a8a,#3b82f6);
    color:#fff;
}
.container{max-width:1000px;margin:30px auto;}
.card{
    background:#fff;
    color:#000;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}
textarea{width:100%;height:180px;}
button{margin:5px;padding:10px;}
.group{background:#eef;border-radius:10px;padding:10px;margin:10px 0;}
.member{display:inline-block;background:#fff;margin:4px;padding:6px 10px;border-radius:20px;}
.leader{background:#ef4444;color:#fff;}
</style>
</head>

<body>

<div class="container">

<div class="card">
<textarea id="names"></textarea><br>

<label><input type="radio" name="mode" value="groups" checked> Jumlah Grup</label>
<label><input type="radio" name="mode" value="members"> Anggota per Grup</label><br><br>

<input type="number" id="count" value="4"><br><br>

<label><input type="checkbox" id="leader" checked> Ketua</label><br><br>

<button onclick="generate()">Bagi</button>
<button onclick="downloadCSV()">CSV</button>
<button onclick="save()">Simpan</button>
<button onclick="load()">Load</button>
<button onclick="clearAll()">Hapus</button>
</div>

<div class="card" id="result" style="display:none;"></div>

</div>

<script>

// ===== FIXED GROUP (TERSEMBUNYI) =====
const FIXED_GROUPS = [
    ["RaMa","Tiara"],
];

// shuffle
function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

// generate
function generate(){
    let input=document.getElementById("names").value.trim();
    if(!input)return alert("Isi dulu");

    let lines=input.split("\n").map(x=>x.trim()).filter(x=>x);

    let co=[],ce=[],other=[];

    lines.forEach(n=>{
        if(n.toUpperCase().includes("(CO)")){
            co.push(n.replace("(CO)","").trim());
        }else if(n.toUpperCase().includes("(CE)")){
            ce.push(n.replace("(CE)","").trim());
        }else{
            other.push(n);
        }
    });

    let allNames=[...co,...ce,...other];

    // ===== APPLY FIXED =====
    let used=new Set();
    FIXED_GROUPS.forEach(g=>g.forEach(n=>used.add(n)));

    let remaining=allNames.filter(n=>!used.has(n));
    remaining=shuffle(remaining);

    let mode=document.querySelector('input[name="mode"]:checked').value;
    let count=parseInt(document.getElementById("count").value);
    let leader=document.getElementById("leader").checked;

    let groups=[];

    if(mode==="groups"){
        groups=Array.from({length:count},()=>[]);
        let i=0;

        FIXED_GROUPS.forEach(g=>{
            groups[i%count].push(...g);
            i++;
        });

        remaining.forEach(n=>{
            groups[i%count].push(n);
            i++;
        });

    }else{
        let combined=[...FIXED_GROUPS.flat(),...remaining];
        combined=shuffle(combined);

        for(let i=0;i<combined.length;i+=count){
            groups.push(combined.slice(i,i+count));
        }
    }

    // 🔥 ACAK POSISI GRUP
    groups = shuffle(groups);

    // 🔥 ACAK ISI DALAM GRUP
    groups = groups.map(g => shuffle(g));

    let result=document.getElementById("result");
    result.innerHTML="";

    groups.forEach((g,i)=>{
        if(g.length===0)return;

        let html=`<div class="group"><b>Grup ${i+1}</b><br>`;

        let leaderIndex=leader?Math.floor(Math.random()*g.length):-1;

        g.forEach((m,idx)=>{
            if(idx===leaderIndex){
                html+=`<span class="member leader">👑 ${m}</span>`;
            }else{
                html+=`<span class="member">${m}</span>`;
            }
        });

        html+="</div>";
        result.innerHTML+=html;
    });

    result.style.display="block";
}

// csv
function downloadCSV(){
    let groups=document.querySelectorAll(".group");
    if(groups.length===0)return alert("Belum ada hasil");

    let csv="Grup,Nama,Status\n";

    groups.forEach((g,i)=>{
        g.querySelectorAll(".member").forEach(m=>{
            let name=m.textContent.replace("👑 ","");
            let status=m.classList.contains("leader")?"Ketua":"Anggota";
            csv+=`Grup ${i+1},${name},${status}\n`;
        });
    });

    let a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURI(csv);
    a.download="grup.csv";
    a.click();
}

// save
function save(){
    localStorage.setItem("data",document.getElementById("names").value);
}

// load
function load(){
    let d=localStorage.getItem("data");
    if(d)document.getElementById("names").value=d;
}

// clear
function clearAll(){
    document.getElementById("names").value="";
    document.getElementById("result").style.display="none";
}

// auto isi
window.onload=function(){
    if(localStorage.getItem("data")){
        load();
    }else{
        document.getElementById("names").value=`Abiy (CO)

    }
}
</script>

</body>
</html>
